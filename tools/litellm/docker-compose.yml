# LiteLLM proxy — exposes an OpenAI-compatible endpoint at http://localhost:4000
# Usage:
#   docker compose -f tools/litellm/docker-compose.yml up -d
#   docker compose -f tools/litellm/docker-compose.yml down
# Or via the wrapper scripts:
#   scripts/router.ps1 start   (Windows)
#   scripts/router.sh start    (Linux / macOS)

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      # Mount config read-only so restarts pick up edits automatically
      - ../../tools/litellm/config.yaml:/app/config.yaml:ro
    env_file:
      - ../../.env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-""}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-loom-dev}
    command: --config /app/config.yaml --port 4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
